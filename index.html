<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo to PDF (HEIC Supported)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 10px; transition: 0.2s; }
        .btn-add { background-color: #6c5ce7; color: white; }
        .btn-download { background-color: #00b894; color: white; display: none; }
        #preview-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .preview-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid #eee; }
        input[type="file"] { display: none; }
        .status { margin-top: 10px; font-size: 14px; color: #636e72; }
        #loading-overlay { display: none; color: #6c5ce7; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Image to PDF</h2>
    <div id="loading-overlay">Converting images... please wait...</div>
    <p class="status" id="counter">0 / 10 photos added</p>
    
    <label for="imageInput" class="btn btn-add">Select Photos</label>
    <input type="file" id="imageInput" accept="image/*, .heic" multiple>
    
    <button id="downloadBtn" class="btn btn-download">Download PDF</button>

    <div id="preview-container"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('preview-container');
    const downloadBtn = document.getElementById('downloadBtn');
    const loading = document.getElementById('loading-overlay');
    const counter = document.getElementById('counter');
    
    let imagesArray = [];

    imageInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        
        if (imagesArray.length + files.length > 10) {
            alert("Limit reached! Max 10 photos.");
            return;
        }

        loading.style.display = 'block';

        for (let file of files) {
            let blob = file;

            // Check if it's a HEIC file
            if (file.name.toLowerCase().endsWith('.heic')) {
                try {
                    const converted = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.7 });
                    blob = Array.isArray(converted) ? converted[0] : converted;
                } catch (err) {
                    console.error("HEIC conversion failed", err);
                }
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const imgData = event.target.result;
                imagesArray.push(imgData);
                
                const img = document.createElement('img');
                img.src = imgData;
                img.classList.add('preview-img');
                previewContainer.appendChild(img);

                updateUI();
            };
            reader.readAsDataURL(blob);
        }
        loading.style.display = 'none';
    });

    function updateUI() {
        counter.innerText = `${imagesArray.length} / 10 photos added`;
        downloadBtn.style.display = imagesArray.length > 0 ? 'inline-block' : 'none';
    }

    downloadBtn.onclick = () => {
        const pdf = new jsPDF();
        imagesArray.forEach((img, i) => {
            if (i > 0) pdf.addPage();
            pdf.addImage(img, 'JPEG', 10, 10, 190, 0);
        });
        pdf.save("my-photos.pdf");
    };
</script>

</body>
</html>
